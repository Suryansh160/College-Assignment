<script>
  const myPromise = new Promise((resolved, rejected) => {
    const a = 2,
      b = 1
    const c = a + b
    if (c === 4) {
      resolved(`yes!, ${a} + ${b} = ${c}`)
    } else {
      rejected(`no!, ${a} + ${b} = ${c}`)
    }
  })

  myPromise
    .then(m => {
      console.log(m)
    })
    .catch(err => {
      console.log(err)
    })
</script>
